<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICAR Live Monitoring Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f3f4f6;
}
.big-value {
    font-size: 40px;
    font-weight: bold;
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6 text-center">ICAR IoT Discharge Monitoring</h1>

<!-- CURRENT VALUE -->
<div class="bg-white p-6 rounded-xl shadow mb-6 text-center">
    <h2 class="text-lg text-gray-600">Current Discharge</h2>
    <div id="currentValue" class="big-value text-emerald-600">-- L/min</div>
</div>

<!-- GRAPH -->
<div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-lg font-bold mb-4">Live Discharge Graph</h2>
    <canvas id="chartCanvas"></canvas>
</div>

<!-- TABLE -->
<div class="bg-white p-6 rounded-xl shadow">
    <div class="flex justify-between mb-4">
        <h2 class="text-lg font-bold">Last 10 Records</h2>

        <a href="https://docs.google.com/spreadsheets/d/1Ezqokpwi8i1e0J8NUqKnWMgLuWeGcedoG3AHZNhnFMY/edit"
           target="_blank"
           class="bg-blue-600 text-white px-4 py-2 rounded">
           Full Data
        </a>
    </div>

    <div id="tableContainer"></div>
    <p id="timeText" class="text-sm text-gray-500 mt-3"></p>
</div>

<script>
let chart;

async function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/1Ezqokpwi8i1e0J8NUqKnWMgLuWeGcedoG3AHZNhnFMY/gviz/tq?tqx=out:json";

    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const cols = json.table.cols;
    const rows = json.table.rows;

    const last10 = rows.slice(-10);

    // ===== CURRENT VALUE =====
    const latest = last10[last10.length - 1];
    const discharge = latest.c[1]?.v || "--"; // assuming column 2 = discharge

    document.getElementById("currentValue").innerText = discharge + " L/min";

    // ===== GRAPH DATA =====
    const labels = [];
    const values = [];

    last10.forEach(r => {
        labels.push(r.c[0]?.v || ""); // time
        values.push(r.c[1]?.v || 0);  // discharge
    });

    // ===== DRAW GRAPH =====
    if (chart) chart.destroy();

    const ctx = document.getElementById('chartCanvas');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Discharge (L/min)',
                data: values,
                fill: false
            }]
        },
        options: {
            responsive: true
        }
    });

    // ===== TABLE =====
    let html = "<table class='w-full border text-sm'>";
    
    html += "<tr class='bg-gray-200'>";
    cols.forEach(c => {
        html += `<th class='border p-2'>${c.label}</th>`;
    });
    html += "</tr>";

    last10.reverse().forEach(r => {
        html += "<tr>";
        r.c.forEach(cell => {
            html += `<td class='border p-2'>${cell ? cell.v : ""}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";

    document.getElementById("tableContainer").innerHTML = html;

    // ===== TIME =====
    document.getElementById("timeText").innerText =
        "Last updated: " + new Date().toLocaleTimeString();
}

// AUTO REFRESH
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
